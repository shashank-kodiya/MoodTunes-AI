# Configuration file for Emotion-Based Music Recommendation App

# Emotion Detection Settings
[emotion_detection]
# Face detection scale factor (lower = more accurate but slower)
face_cascade_scale_factor = 1.3

# Minimum neighbors for face detection (higher = fewer false positives)
face_cascade_min_neighbors = 5

# Model input size (height, width)
model_input_size = (48, 48)

# Model preprocessing
normalize_input = true
normalization_range = [0, 1]

# Confidence filtering
confidence_threshold = 0.5

# Video capture settings
[video_capture]
# Capture device (0 = default webcam)
device = 0

# Target FPS
target_fps = 30

# Default capture duration in seconds
default_capture_duration = 3

# Maximum frames per session
max_frames_per_session = 150

# UI Settings
[ui]
# Streamlit page title
page_title = 🎵 Emotion-Based Music Recommendation

# Page icon
page_icon = 🎵

# Layout
layout = wide

# Display settings
show_video_feed = true
show_statistics = true
show_emotion_distribution = true

# Sidebar settings
show_sidebar = true
sidebar_expanded = true

# Music Recommendation Settings
[recommendations]
# Number of songs per emotion
songs_per_emotion = 5

# Future enhancement: Spotify API
spotify_api_enabled = false
spotify_api_key = ""

# Future enhancement: YouTube API
youtube_api_enabled = false
youtube_api_key = ""

# Emotion Processing Settings
[emotion_processing]
# Method for determining final emotion (top, majority, weighted_avg)
final_emotion_method = top

# Minimum frames for valid detection
min_frames_for_detection = 5

# Emotion labels
emotion_labels = ["angry", "disgust", "fear", "happy", "neutral", "sad", "surprise"]

# Logging and Debugging
[logging]
# Enable debug mode
debug_mode = false

# Log file location
log_file = logs/app.log

# Log level (INFO, DEBUG, WARNING, ERROR)
log_level = INFO

# Model Settings
[model]
# Model path (leave empty to use default/create new)
model_path = ""

# Model architecture
model_type = cnn

# Pre-trained model source
pretrained_source = keras  # Options: keras, huggingface, custom

# Performance Settings
[performance]
# Use GPU if available
use_gpu = true

# Threading
enable_threading = true
max_threads = 4

# Cache emotion detections
cache_detections = true

# Advanced Settings
[advanced]
# Face detection method (haarcascade, dnn, mtcnn)
face_detection_method = haarcascade

# Emotion model precision (float32, float16)
model_precision = float32

# Frame preprocessing
apply_histogram_equalization = false
apply_blur = false
blur_kernel = 5

# Augmentation settings (for training, not inference)
augmentation_enabled = false
